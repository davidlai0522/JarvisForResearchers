name: Deploy JarvisForResearchers to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Deploy to GitHub Pages
        # --force rewrites the gh-pages branch with the built site.
        # mkdocs gh-deploy already adds .nojekyll to the gh-pages branch,
        # so Jekyll never runs on the deployed output.
        run: mkdocs gh-deploy --force --remote-branch gh-pages
