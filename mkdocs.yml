theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: deep orange
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.top
    - navigation.indexes
    - navigation.expand
    - content.code.copy
    - search.highlight

plugins:
  - search
  - blog:
      blog_dir: digest
      post_date_format: long
      post_url_format: "{slug}"
      archive: true
      archive_name: Archive
      archive_date_format: "MMMM yyyy"
      archive_url_format: "archive/{date}"
      categories: false
  - tags:
      tags_file: tags.md

extra_css:
  - assets/css/blog-filter.css

extra_javascript:
  - assets/js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - assets/js/blog-filter.js

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
