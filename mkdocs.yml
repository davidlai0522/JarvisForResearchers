site_name: JarvisForResearchers
site_description: High-quality robotics & AI research — explained locally with Gemma 4
site_url: https://davidlai0522.github.io/JarvisForResearchers

nav:
  - Home: index.md
  - Research Digest:
    - Overview: posts/index.md
    - "Benchmarking Vision, Language, & Action Models on Robotic Learning Tasks": posts/2026-05-14-benchmarking-vision-language-action-models-on-robotic-learni.md
    - "Normalizing Trajectory Models": posts/2026-05-12-normalizing-trajectory-models.md
    - "BAMI: Training-Free Bias Mitigation in GUI Grounding": posts/2026-05-10-bami-training-free-bias-mitigation-in-gui-grounding.md
    - "$π_0$: A Vision-Language-Action Flow Model for General Robot Control": posts/2026-05-10-0-a-vision-language-action-flow-model-for-general-robot-cont.md
    - "World Model for Robot Learning: A Comprehensive Survey": posts/2026-05-09-world-model-for-robot-learning-a-comprehensive-survey.md
    - "ActCam: Zero-Shot Joint Camera and 3D Motion Control for Video Generation": posts/2026-05-09-actcam-zero-shot-joint-camera-and-3d-motion-control-for-vide.md
    - "Audio-Visual Intelligence in Large Foundation Models": posts/2026-05-07-audio-visual-intelligence-in-large-foundation-models.md
    - "AlbumFill: Album-Guided Reasoning and Retrieval for Personalized Image Completion": posts/2026-05-06-albumfill-album-guided-reasoning-and-retrieval-for-personali.md
    - "Posterior Augmented Flow Matching": posts/2026-05-05-posterior-augmented-flow-matching.md
    - "HERMES++: Toward a Unified Driving World Model for 3D Scene Understanding and Generation": posts/2026-05-01-hermes-toward-a-unified-driving-world-model-for-3d-scene-und.md
    - "GR00T N1: An Open Foundation Model for Generalist Humanoid Robots": posts/2026-05-01-gr00t-n1-an-open-foundation-model-for-generalist-humanoid-ro.md
    - "Generalizable Sparse-View 3D Reconstruction from Unconstrained Images": posts/2026-05-01-generalizable-sparse-view-3d-reconstruction-from-unconstrain.md
    - "Eureka: Human-Level Reward Design via Coding Large Language Models": posts/2026-05-01-eureka-human-level-reward-design-via-coding-large-language-m.md
    - "An Adaptable, Safe, and Portable Robot-Assisted Feeding System": posts/2026-05-01-an-adaptable-safe-and-portable-robot-assisted-feeding-system.md
  - Weekly Digest: digest/index.md
  - Tags: tags.md

theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: deep orange
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.top
    - navigation.indexes
    - navigation.expand
    - content.code.copy
    - search.highlight

plugins:
  - search
  - blog:
      blog_dir: digest
      post_date_format: long
      post_url_format: "{slug}"
      archive: true
      archive_name: Archive
      archive_date_format: "MMMM yyyy"
      archive_url_format: "archive/{date}"
      categories: false
  - tags:
      tags_file: tags.md

extra_css:
  - assets/css/blog-filter.css

extra_javascript:
  - assets/js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - assets/js/blog-filter.js

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
